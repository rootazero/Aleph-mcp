name: Publish siliconflow to npm

# Publishes aleph-siliconflow-mcp to npm when a GitHub Release tagged "siliconflow-v*" is published.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN; provenance is generated automatically.
#
# One-time setup before the first Release:
#   1. On npmjs.com, configure a Trusted Publisher for package "aleph-siliconflow-mcp":
#        - Organization/owner: rootazero   Repository: Aleph-mcp
#        - Workflow filename: publish-siliconflow.yml
#        - Environment name: npm
#   2. Create a GitHub environment named "npm" in repo settings (already exists if t8star is set up).

on:
  release:
    types: [published]

jobs:
  npm:
    if: startsWith(github.event.release.tag_name, 'siliconflow-')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # required for npm OIDC trusted publishing
      contents: read
    defaults:
      run:
        working-directory: siliconflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest   # need npm >=11 for OIDC trusted publishing
      - run: npm ci
      - run: npm run build
      - run: npm publish               # OIDC trusted publishing; provenance automatic
