name: CI (siliconflow)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: siliconflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: siliconflow/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test
